<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<title>Terminal Typewriter</title>
<style>
  :root{
    --bg:#000000;            /* terminal background */
    --lime:#00FF00;          /* lime */
    --magenta:#FF00FF;       /* magenta */
    --deepgreen:#006400;     /* deep green (dark) */
    --text:#c7f6c7;          /* fallback pale green */
    --glass: rgba(255,255,255,0.03);
  }

  html,body{height:100%;margin:0;background:var(--bg);font-family:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, "Courier New", monospace;color:var(--text);}

  .terminal {
    max-width:900px;
    margin:48px auto;
    padding:28px;
    background: linear-gradient(180deg, rgba(10,12,10,0.95), rgba(0,0,0,0.9));
    border-radius:8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.03);
    line-height:1.4;
    font-size:18px;
    white-space:pre-wrap;
  }

  /* The output area where typed characters appear */
  .output {
    font-family: inherit;
    color:var(--text);
    min-height:2.2em;
    word-break:break-word;
  }

  /* color classes you can wrap text in */
  .lime { color: var(--lime); }
  .magenta { color: var(--magenta); }
  .deepgreen { color: var(--deepgreen); }

  /* typewriter effect: we reveal characters with JS; caret is CSS animated */
  .caret {
    display:inline-block;
    width:10px;
    height:1.2em;
    background:var(--text);
    margin-left:2px;
    vertical-align:bottom;
    animation:blink 1s steps(2, start) infinite;
    opacity:0.9;
  }
  @keyframes blink { 50% { opacity:0; } }

  /* optional glassy prompt line */
  .prompt {
    color: rgba(255,255,255,0.08);
    margin-right:8px;
  }

  /* smaller on phones */
  @media (max-width:520px){
    .terminal{padding:18px;font-size:15px;}
    .caret{width:8px;height:1.1em;}
  }
</style>
</head>
<body>
  <div class="terminal" role="region" aria-label="Terminal">
    <div id="output" class="output"></div><span class="caret" aria-hidden="true"></span>
  </div>

<script>
/*
  Usage:
  - lines: an array of strings. You can include HTML spans with classes "lime", "magenta", "deepgreen"
    Example: '<span class="lime">hello</span> <span class="magenta">world</span>'
  - The script types each character and preserves HTML tags (it handles tags so coloring stays intact).
*/

const lines = [
  '<span class="lime">root@machine</span>:<span class="deepgreen">~</span>$ <span class="magenta">echo "Welcome to the terminal demo"</span>',
  '<span class="magenta">Welcome to the terminal demo</span>',
  '<span class="lime">user@baitlab</span>:<span class="deepgreen">~/projects</span>$ <span class="magenta">ls -la</span>',
  '<span class="deepgreen">drwxr-xr-x  12 user staff  384 Mar 24 12:00 .</span>',
  '<span class="deepgreen">-rw-r--r--   1 user staff  1024 Mar 24 12:00 readme.md</span>',
];

const outputEl = document.getElementById('output');
let lineIndex = 0;
const typingSpeed = 28;       // ms per character (reduce for faster typing)
const linePause = 700;       // pause after each line (ms)

function typeLine(htmlString, cb) {
  // We need to iterate over the string but preserve tags.
  const parser = new DOMParser();
  // Wrap in container so we can parse fragments easily
  const doc = parser.parseFromString(`<div>${htmlString}</div>`, 'text/html');
  const container = doc.body.firstChild;

  // Build a flat array of nodes where each item is {text, node} with text being actual characters to type
  const tokens = [];
  function walk(node, wrapper) {
    if (node.nodeType === Node.TEXT_NODE) {
      for (const ch of node.textContent) {
        tokens.push({ch, wrapper});
      }
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      const newWrapper = node.cloneNode(false);
      // apply class names / styles from element into wrapper element for insertion
      tokens.push({tagOpen: newWrapper});
      for (const child of node.childNodes) walk(child, newWrapper);
      tokens.push({tagClose: newWrapper.tagName});
    }
  }
  for (const child of container.childNodes) walk(child, null);

  // We'll build elements in the real DOM as we go, maintaining a stack for open tags
  const stack = [outputEl];
  let i = 0;
  function step() {
    if (i >= tokens.length) {
      if (cb) cb();
      return;
    }
    const token = tokens[i++];
    if (token.tagOpen) {
      // create element in DOM and push to stack
      const el = document.createElement(token.tagOpen.tagName);
      // copy classList
      el.className = token.tagOpen.className || '';
      stack[stack.length-1].appendChild(el);
      stack.push(el);
      step(); // immediately process next token without delay for tag creation
      return;
    } else if (token.tagClose) {
      stack.pop();
      step();
      return;
    } else {
      // plain character: append to current top of stack
      stack[stack.length-1].appendChild(document.createTextNode(token.ch));
      i && setTimeout(step, typingSpeed);
      return;
    }
  }
  step();
}

function run() {
  if (lineIndex >= lines.length) return;
  // optionally add a new line element for each typed line
  const lineWrapper = document.createElement('div');
  outputEl.appendChild(lineWrapper);
  const prevOutput = outputEl; // we append characters inside last child
  // swap outputEl reference to the new wrapper while typing this line
  // (so tags are built inside the new line)
  const realOutputEl = outputEl;
  // Temporarily point to new wrapper
  outputEl = lineWrapper;
  typeLine(lines[lineIndex], () => {
    // after typing a line restore outputEl to parent terminal area
    outputEl = prevOutput;
    lineIndex++;
    setTimeout(run, linePause);
  });
}

// Because we changed outputEl in run we need a small wrapper that manages the global var above
(function startTyping(){
  // We'll implement a simpler orchestrator to preserve scoping:
  const container = document.getElementById('output');
  let idx = 0;

  function typeHtml(html, done){
    // simpler safe approach: reveal html into a hidden element and then reveal char-by-char
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    const flat = [];
    function explode(node, parentTag){
      if (node.nodeType === Node.TEXT_NODE){
        for (const ch of node.textContent) flat.push({ch, tag: parentTag});
      } else if (node.nodeType === Node.ELEMENT_NODE){
        const tagName = node.tagName;
        const attributes = Array.from(node.attributes).reduce((acc,a)=>{acc[a.name]=a.value;return acc;},{})
        flat.push({openTag:true, tagName, attributes});
        for (const c of node.childNodes) explode(c, null);
        flat.push({closeTag:true, tagName});
      }
    }
    for (const c of tmp.childNodes) explode(c, null);

    const stack = [container];
    let p = container;
    let i = 0;
    function doStep(){
      if (i >= flat.length){ done && done(); return; }
      const t = flat[i++];
      if (t.openTag){
        const el = document.createElement(t.tagName);
        if (t.attributes){
          for (const k in t.attributes) el.setAttribute(k, t.attributes[k]);
        }
        stack[stack.length-1].appendChild(el);
        stack.push(el);
        doStep();
      } else if (t.closeTag){
        stack.pop();
        doStep();
      } else {
        stack[stack.length-1].appendChild(document.createTextNode(t.ch));
        setTimeout(doStep, typingSpeed);
      }
    }
    doStep();
  }

  function loop(){
    if (idx >= lines.length) return;
    // create a new line container
    const lineDiv = document.createElement('div');
    container.appendChild(lineDiv);
    // temporarily point insertion to that new div by swapping id
    const old = container;
    const tmpId = container.id;
    container.lastChild && container.lastChild.setAttribute('data-line', idx);
    // use typeHtml but with container reference replaced inside via closure
    const savedContainer = document.getElementById('output');
    // monkey-patch by passing a custom container to typeHtml: modify typeHtml to accept container
    (function typeHtmlInto(html, where, done){
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      const flat = [];
      function explode(node){
        if (node.nodeType === Node.TEXT_NODE){
          for (const ch of node.textContent) flat.push({ch});
        } else if (node.nodeType === Node.ELEMENT_NODE){
          const tagName = node.tagName;
          const attributes = Array.from(node.attributes).reduce((acc,a)=>{acc[a.name]=a.value;return acc;},{})
          flat.push({openTag:true, tagName, attributes});
          for (const c of node.childNodes) explode(c);
          flat.push({closeTag:true, tagName});
        }
      }
      for (const c of tmp.childNodes) explode(c);

      const stack = [where];
      let i = 0;
      function step(){
        if (i >= flat.length){ done && done(); return; }
        const t = flat[i++];
        if (t.openTag){
          const el = document.createElement(t.tagName);
          if (t.attributes){
            for (const k in t.attributes) el.setAttribute(k, t.attributes[k]);
          }
          stack[stack.length-1].appendChild(el);
          stack.push(el);
          step();
        } else if (t.closeTag){
          stack.pop();
          step();
        } else {
          stack[stack.length-1].appendChild(document.createTextNode(t.ch));
          setTimeout(step, typingSpeed);
        }
      }
      step();
    })(lines[idx], lineDiv, ()=>{
      idx++;
      setTimeout(loop, linePause);
    });
  }

  loop();
})();
</script>
</body>
</html>
