<html>
<head>
    <title>Terminal Typewriter Demo</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        #output { white-space: pre; }
    </style>
</head>
<body>
    <h1>Terminal Typewriter Demo</h1>
    <div id="output"></div>
    <script>
        const text = 'Welcome to the Terminal Typewriter Demo!\nThis is a sample text that will be typed out letter by letter.';
        let index = 0;
        const outputDiv = document.getElementById('output');

        function typeWriter() {
            if (index < text.length) {
                outputDiv.innerHTML += text.charAt(index);
                index++;
                setTimeout(typeWriter, 100);
            }
        }

        typeWriter();
    </script>
</body>
</html>
